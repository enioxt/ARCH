version: '3.8'

services:
  arch:
    build: .
    container_name: egos-arch
    restart: unless-stopped
    ports:
      - "3098:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=egos-sinapi-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=egos_arch
      - POSTGRES_USER=sinapi_user
      - POSTGRES_PASSWORD=sinapi_pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - egos-arch_default

networks:
  egos-arch_default:
    driver: bridge
