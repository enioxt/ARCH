version: '3.8'

services:
  arch:
    build: .
    container_name: egos-arch
    restart: unless-stopped
    ports:
      - "3098:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
